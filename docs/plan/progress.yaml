# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.

config:
  verify: "npx tsc --noEmit && npm run test && npm run test:e2e"
  max_tasks_per_phase: 200
  quality_check_suppressions: []
  build_loop_version:
    init_version: 13
    builds: [13]

state:
  # --- Lifecycle (owner: iterator) ---
  phase: foundation
  phase_complete: false
  status: running

  # --- Task orchestration (owner: iterator) ---
  task_number: 10
  next_task: "[phase] L93 source-scan test: add src/source-scan.test.ts that reads every src/**/*.ts file (excluding *.test.ts), finds each `catch (` occurrence, and asserts the enclosing block contains either `throw` or `console.error` before its closing brace. Use a simple brace-walk (track depth from the `{` after `catch (...)`) rather than a full parser. Include a positive assertion that at least one src file is scanned (guards against glob regression). No changes to production code expected; if the scan reveals a violation, fix it in the SAME task by adding the missing throw/console.error with context. Closes phase-level L93 (no bare catches / silent swallowing)."
  last_result: pass
  consecutive_fails: 0

  # --- Review (owner: iterator) ---
  review_stage: null
  review_complete: false
  pr_number: null

  # --- Retrospective (owner: retro) ---
  retro_complete: false

  # --- Tracking (owner: iterator) ---
  completed_stories: []
